<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Finger GPT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: sans-serif; }
        
        /* Видео теперь светлее и отзеркалено */
        video {
            position: absolute;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.3; /* Сделали посветлее */
            filter: brightness(1.2) contrast(1.1);
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5;
            pointer-events: none;
        }

        #ui {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            pointer-events: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            color: white;
            pointer-events: auto;
        }

        #startScreen {
            position: fixed; inset: 0;
            background: #050507;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; color: white;
        }

        button {
            padding: 15px 40px; border-radius: 30px; border: none;
            background: #00ffcc; font-weight: bold; cursor: pointer;
        }

        .status-tag { color: #00ffcc; font-family: monospace; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>

<div id="startScreen">
    <h1>Magic Hands GPT</h1>
    <p>Используй обе руки для управления магией</p>
    <button id="startBtn">АКТИВИРОВАТЬ</button>
</div>

<div id="ui">
    <div style="display: flex; justify-content: space-between;">
        <div class="glass">
            <div class="status-tag">SYSTEM: ONLINE</div>
            <div id="handCount">Рук в кадре: 0</div>
        </div>
    </div>
    
    <div id="chat" class="glass" style="width: 300px; height: 100px; overflow: hidden;">
        <div id="messages">Ожидание жеста "Щипок"...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const msgBox = document.getElementById('messages');

function onResults(results) {
    // Настройка размера холста
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    document.getElementById('handCount').innerText = `Рук в кадре: ${results.multiHandLandmarks ? results.multiHandLandmarks.length : 0}`;

    if (results.multiHandLandmarks) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const landmarks = results.multiHandLandmarks[i];
            
            // Рисуем скелет руки
            drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00ffcc', lineWidth: 2});
            drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 3});

            // Проверка щипка
            const thumb = landmarks[4];
            const index = landmarks[8];
            const d = Math.hypot(thumb.x - index.x, thumb.y - index.y);

            if (d < 0.05) {
                // МАГИЯ: Рисуем вспышку в месте щипка
                const x = (1 - index.x) * canvasElement.width; // Инверсия X
                const y = index.y * canvasElement.height;

                createMagic(x, y);
                if(i === 0) msgBox.innerText = "Магия активирована!";
            }
        }
    }
    canvasCtx.restore();
}

function createMagic(x, y) {
    canvasCtx.beginPath();
    canvasCtx.arc(x, y, 15, 0, Math.PI * 2);
    canvasCtx.fillStyle = "rgba(0, 255, 204, 0.5)";
    canvasCtx.fill();
    // Эффект свечения
    canvasCtx.shadowBlur = 20;
    canvasCtx.shadowColor = "#00ffcc";
}

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 2, // ДВЕ РУКИ
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});

hands.onResults(onResults);

const camera = new Camera(video, {
    onFrame: async () => {
        await hands.send({image: video});
    },
    width: 1280,
    height: 720
});

document.getElementById('startBtn').onclick = () => {
    document.getElementById('startScreen').style.display = 'none';
    camera.start();
};
</script>
</body>
</html>
