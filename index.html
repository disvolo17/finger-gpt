<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Generative Magic Hands</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        video {
            position: absolute; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1); opacity: 0.25; /* Еще темнее видео */
            filter: contrast(1.2);
        }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 20;
            padding: 10px 20px; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px); border-radius: 12px;
            color: #00ffcc; font-family: monospace; font-size: 12px;
            pointer-events: none;
        }
        #btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; padding: 18px 45px; background: none; border: 2px solid #00ffcc;
            color: #00ffcc; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 18px;
            transition: 0.3s;
        }
        #btn:hover { background: rgba(0,255,204,0.1); box-shadow: 0 0 20px rgba(0,255,204,0.3); }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>
<div id="ui">AWAITING...</div>
<button id="btn">ACTIVATE MAGIC</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const ui = document.getElementById('ui');

// ===== PARTICLES & TRAILS SYSTEM =====
const particles = [];
const trails = []; // Массив для сложных хвостов

function spawnGenerativeMagic(x, y, color) {
    // 1. Создаем вспышку частиц
    for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 6;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0,
            color: color || '#fff'
        });
    }
    
    // 2. Создаем "каллиграфический" хвост (trail)
    trails.push({ x, y, life: 1.0, color: color || '#fff' });
}

// Постоянный цикл анимации (для плавности частиц)
let frame = 0;
function animate() {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // Рисуем хвосты (trails) — как в видео
    canvasCtx.lineWidth = 1;
    for (let i = trails.length - 1; i >= 0; i--) {
        const tr = trails[i];
        tr.life *= 0.96;
        canvasCtx.strokeStyle = `rgba(255, 255, 255, ${tr.life * 0.5})`;
        canvasCtx.beginPath();
        // Добавляем немного шума к траектории
        canvasCtx.arc(tr.x + Math.sin(frame*0.1 + i)*10, tr.y + Math.cos(frame*0.1+i)*10, 2, 0, Math.PI*2);
        canvasCtx.stroke();
        if (tr.life < 0.01) trails.splice(i, 1);
    }

    // Рисуем частицы
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life *= 0.94; // Чуть медленнее исчезают
        canvasCtx.fillStyle = `rgba(0, 255, 204, ${p.life})`;
        
        // Магия: размер частицы зависит от её жизни
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
        canvasCtx.fill();
        if (p.life < 0.01) particles.splice(i, 1);
    }
    
    frame++;
    requestAnimationFrame(animate);
    canvasCtx.restore();
}
animate();

// ===== HAND TRACKING =====
let lastTrigger = 0;
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function onResults(results) {
    canvasElement.width = video.clientWidth;
    canvasElement.height = video.clientHeight;

    if (results.multiHandLandmarks) {
        ui.innerText = `MAGIC ONLINE | HANDS: ${results.multiHandLandmarks.length}`;
        
        for (const landmarks of results.multiHandLandmarks) {
            // Зеркалим координаты
            const m = landmarks.map(p => ({ x: 1 - p.x, y: p.y }));

            // Скелет (тонкий, как каллиграфия)
            drawConnectors(canvasCtx, m, HAND_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.15)', lineWidth: 1});

            const x = m[8].x * canvasElement.width;
            const y = m[8].y * canvasElement.height;
            const d = dist(m[4], m[8]);

            // Pinch (Щипок)
            if (d < 0.045) {
                // Визуальный отклик в точке касания
                canvasCtx.shadowBlur = 40;
                canvasCtx.shadowColor = "#ff4d4d";
                canvasCtx.fillStyle = "#ff4d4d";
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 10, 0, Math.PI * 2);
                canvasCtx.fill();
                canvasCtx.shadowBlur = 0;

                // Создаем "магию" (каллиграфия + искры)
                if (Date.now() - lastTrigger > 150) {
                    spawnGenerativeMagic(x, y, '#00ffcc');
                    lastTrigger = Date.now();
                }
            }
        }
    } else {
        ui.innerText = "WAITING FOR HANDS...";
    }
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7});
hands.onResults(onResults);

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
});

document.getElementById('btn').onclick = (e) => {
    e.target.remove();
    camera.start();
};
</script>
</body>
</html>
