<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Finger GPT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    overflow:hidden;
    background:#050507;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
}

/* камера */
video {
    position:absolute;
    width:100vw;
    height:100vh;
    object-fit:cover;
    opacity:0.08;
}

/* UI */
#ui {
    position:absolute;
    inset:0;
    pointer-events:none;
}

/* центр */
#centerBox {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 28px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    text-align:center;
}

#title {
    font-size:26px;
    font-weight:600;
}

#subtitle {
    font-size:14px;
    opacity:0.6;
    margin-top:6px;
}

/* чат */
#chat {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:400px;
    max-width:90vw;
    padding:16px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

.message {
    margin-bottom:10px;
    font-size:14px;
    opacity:0.85;
}

/* статус */
#status {
    position:absolute;
    top:20px;
    right:30px;
    font-size:12px;
    opacity:0.6;
}

/* курсор */
#cursor {
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#00ffcc;
    transform:translate(-50%,-50%);
    pointer-events:none;
    transition:0.1s;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="ui">
    <div id="status">Ready</div>

    <div id="centerBox">
        <div id="title">Finger GPT</div>
        <div id="subtitle">Управляй AI руками</div>
    </div>

    <div id="chat"></div>

    <div id="cursor"></div>
</div>

<script type="module">
import { Hands } from "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";
import { Camera } from "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

// UI
const status = document.getElementById("status");
const cursorEl = document.getElementById("cursor");
const chat = document.getElementById("chat");

// добавление сообщений
function addMessage(text){
    const div = document.createElement("div");
    div.className = "message";
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ===== HAND =====
const video = document.getElementById("video");

let cursor = {x:0,y:0};
let lastPinch = false;

function dist(a,b){
    return Math.hypot(a.x-b.x, a.y-b.y);
}

function isPinch(lm){
    return dist(lm[4], lm[8]) < 0.05;
}

// ===== TRACKING =====
const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(res=>{
    if(!res.multiHandLandmarks) return;

    const lm = res.multiHandLandmarks[0];

    cursor.x = lm[8].x * window.innerWidth;
    cursor.y = lm[8].y * window.innerHeight;

    cursorEl.style.left = cursor.x + "px";
    cursorEl.style.top = cursor.y + "px";

    const pinch = isPinch(lm);

    // визуал курсора
    cursorEl.style.background = pinch ? "#ff4d4d" : "#00ffcc";

    // действие
    if(pinch && !lastPinch){
        status.innerText = "Click";

        handleClick(cursor.x, cursor.y);
    } else {
        status.innerText = "Tracking";
    }

    lastPinch = pinch;
});

// ===== ЛОГИКА UI =====
function handleClick(x,y){

    // если клик по центру → отправка команды
    const center = document.getElementById("centerBox").getBoundingClientRect();

    if(
        x > center.left &&
        x < center.right &&
        y > center.top &&
        y < center.bottom
    ){
        addMessage("Ты: Запусти систему");

        setTimeout(()=>{
            addMessage("GPT: Система активирована");
        },600);
    }

    // если клик внизу → новый запрос
    const chatBox = document.getElementById("chat").getBoundingClientRect();

    if(
        x > chatBox.left &&
        x < chatBox.right &&
        y > chatBox.top &&
        y < chatBox.bottom
    ){
        addMessage("Ты: Привет");
        setTimeout(()=>{
            addMessage("GPT: Привет 👋");
        },500);
    }
}

// камера
const cam = new Camera(video,{
    onFrame: async ()=> await hands.send({image:video}),
    width:1280,
    height:720
});
cam.start();

</script>

</body>
</html>
