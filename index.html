<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Generative Art - Magic Hands</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video {
            position: absolute; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1); opacity: 0.2;
            filter: contrast(1.3) brightness(0.8);
        }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 10;
        }
        #ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; color: rgba(255,255,255,0.7); font-size: 14px; letter-spacing: 2px;
            pointer-events: none; text-align: center;
        }
        #btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; padding: 15px 40px; background: none; border: 1px solid #fff;
            color: #fff; border-radius: 30px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        #btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>
<div id="ui">AWAITING SYSTEM...</div>
<button id="btn">Activate Generative Art</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

// Глобальные переменные для рендеринга
let currentHands = [];
let smoothedHands = []; // Для плавности
let time = 0;

// Цветовая палитра как в референсе (неон, белый, розовый, синий)
const colors = ['#ffffff', '#ff007f', '#00ffcc', '#b026ff', '#7df9ff'];

// ===== УТИЛИТЫ =====
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }

// Отрисовка звезды на конце линии
function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
    let rot = Math.PI / 2 * 3;
    let step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (let i = 0; i < spikes; i++) {
        let x = cx + Math.cos(rot) * outerRadius;
        let y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;
        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
}

// Генерация "оптоволокна" из точки
function drawVines(x, y, count, baseLength, seedOffset) {
    for (let i = 0; i < count; i++) {
        const seed = i * 1.5 + seedOffset;
        const color = colors[i % colors.length];
        
        // Математика для извивающихся линий (процедурная анимация)
        const length = baseLength + Math.sin(time * 2 + seed) * (baseLength * 0.3);
        // Линии тянутся вверх (negative Y) и немного расходятся в стороны
        const spreadX = Math.sin(time * 1.5 + seed * 2) * 60 + (i - count/2) * 20;
        const spreadY = -length + Math.cos(time * 3 + seed) * 20; 

        const endX = x + spreadX;
        const endY = y + spreadY;

        // Контрольные точки для кривой Безье (чтобы линия гнулась)
        const cp1x = x + spreadX * 0.2;
        const cp1y = y + spreadY * 0.5 + Math.sin(time * 4 + seed)*20;

        // Рисуем линию
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.quadraticCurveTo(cp1x, cp1y, endX, endY);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.8;
        ctx.stroke();

        // Рисуем звезду на конце
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        drawStar(endX, endY, 4, 6, 1.5, '#fff');
        ctx.shadowBlur = 0;
    }
}

// Генерация мандалы на ладони
function drawMandala(x, y, radius, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.globalAlpha = alpha;
    
    // Вращение слоев в разные стороны
    ctx.rotate(time * 0.5);
    
    // Внешнее пунктирное кольцо
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.strokeStyle = colors[1];
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 15]);
    ctx.stroke();

    ctx.rotate(-time * 0.8);
    
    // Внутренняя геометрия
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.6, 0, Math.PI * 2);
    ctx.strokeStyle = colors[2];
    ctx.setLineDash([2, 5]);
    ctx.stroke();

    ctx.setLineDash([]);
    // Рисуем лепестки/треугольники
    for(let i=0; i<8; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(0, radius * 0.3);
        ctx.lineTo(10, radius * 0.5);
        ctx.lineTo(-10, radius * 0.5);
        ctx.closePath();
        ctx.strokeStyle = colors[0];
        ctx.stroke();
    }
    
    ctx.restore();
}

// ===== ГЛАВНЫЙ ЦИКЛ РЕНДЕРИНГА =====
function animate() {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Включаем режим наложения для эффекта свечения
    ctx.globalCompositeOperation = 'screen';

    if (currentHands.length > 0) {
        ui.innerText = "GENERATIVE ART ACTIVE";

        currentHands.forEach((hand, hIdx) => {
            // 1. Сглаживание координат (Lerp)
            if (!smoothedHands[hIdx]) smoothedHands[hIdx] = JSON.parse(JSON.stringify(hand));
            hand.forEach((p, i) => {
                smoothedHands[hIdx][i].x = lerp(smoothedHands[hIdx][i].x, p.x, 0.2);
                smoothedHands[hIdx][i].y = lerp(smoothedHands[hIdx][i].y, p.y, 0.2);
            });

            const sHand = smoothedHands[hIdx];

            // 2. Логика жестов
            const wrist = sHand[0];
            const middleTip = sHand[12];
            const thumbTip = sHand[4];
            const indexTip = sHand[8];
            
            // Центр ладони (примерно 9 точка)
            const palmX = sHand[9].x * canvas.width;
            const palmY = sHand[9].y * canvas.height;

            const isHandOpen = dist(wrist, middleTip) > 0.4; // Раскрыта ли ладонь
            const pinchDist = dist(thumbTip, indexTip); // Расстояние щипка

            if (pinchDist < 0.05) {
                // ЖЕСТ: Щипок. Фонтан из точки щипка.
                const px = indexTip.x * canvas.width;
                const py = indexTip.y * canvas.height;
                drawVines(px, py, 15, 200, 100);
            } 
            else if (isHandOpen) {
                // ЖЕСТ: Раскрытая ладонь. Мандала + нити из всех пальцев.
                drawMandala(palmX, palmY, 70, 1);
                
                // Рисуем нити для кончиков пальцев (4, 8, 12, 16, 20)
                [4, 8, 12, 16, 20].forEach((tipIdx, i) => {
                    const tx = sHand[tipIdx].x * canvas.width;
                    const ty = sHand[tipIdx].y * canvas.height;
                    drawVines(tx, ty, 4, 120, tipIdx * 10); 
                });
            } else {
                // Промежуточное состояние - легкое свечение в центре ладони
                drawMandala(palmX, palmY, 40, 0.3);
            }
        });
    } else {
        ui.innerText = "SHOW HAND TO CAMERA";
        smoothedHands = []; // Сброс сглаживания
    }

    time += 0.02; // Скорость анимации
    requestAnimationFrame(animate);
}

// ===== НАСТРОЙКА MEDIAPIPE =====
function onResults(results) {
    if (results.multiHandLandmarks) {
        // Зеркалируем координаты сразу при получении
        currentHands = results.multiHandLandmarks.map(hand => 
            hand.map(p => ({ x: 1 - p.x, y: p.y, z: p.z }))
        );
    } else {
        currentHands = [];
    }
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6});
hands.onResults(onResults);

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
});

// Запуск
document.getElementById('btn').onclick = (e) => {
    e.target.style.display = 'none';
    camera.start();
    animate(); // Запускаем независимый цикл рендеринга
};
</script>
</body>
</html>
