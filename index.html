<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Finger GPT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    overflow:hidden;
    background:#050507;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
}

/* камера */
video {
    position:absolute;
    width:100vw;
    height:100vh;
    object-fit:cover;
    opacity:0.06;
}

/* старт экран */
#startScreen {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#050507;
    z-index:10;
}

#startScreen h1 {
    font-size:42px;
    margin:0;
}

#startScreen p {
    opacity:0.6;
    margin:10px 0 20px;
}

#startBtn {
    padding:12px 28px;
    border-radius:20px;
    border:none;
    background:white;
    color:black;
    font-size:16px;
    cursor:pointer;
}

/* UI */
#ui { position:absolute; inset:0; pointer-events:none; }

#status {
    position:absolute;
    top:20px;
    right:30px;
    font-size:12px;
    opacity:0.6;
}

/* чат */
#chat {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:420px;
    max-width:90vw;
    padding:16px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

.message {
    margin-bottom:10px;
    font-size:14px;
    opacity:0.9;
}

/* курсор */
#cursor {
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#00ffcc;
    transform:translate(-50%,-50%) scale(1);
    pointer-events:none;
    transition:0.1s;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="startScreen">
  <h1>Finger GPT</h1>
  <p>Управляй AI с помощью жестов</p>
  <button id="startBtn">Start</button>
</div>

<div id="ui">
  <div id="status">Ready</div>
  <div id="chat"></div>
  <div id="cursor"></div>
</div>

<script type="module">
import { Hands } from "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";
import { Camera } from "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

// UI
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const cursorEl = document.getElementById("cursor");
const chat = document.getElementById("chat");
const status = document.getElementById("status");

// старт
startBtn.onclick = () => {
    startScreen.style.display = "none";
    showHint("Покажи руку 👋");
};

// сообщения
function addMessage(text){
    const div = document.createElement("div");
    div.className = "message";
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// hint
function showHint(text){
    status.innerText = text;
}

// AI ответы
const responses = [
    "Анализирую...",
    "Обрабатываю запрос",
    "Готово",
    "Интересная команда",
    "Запускаю систему"
];

// ===== HAND =====
const video = document.getElementById("video");

let cursor = {x:0,y:0};
let lastPinch = false;
let holdStart = null;

function dist(a,b){
    return Math.hypot(a.x-b.x, a.y-b.y);
}

function isPinch(lm){
    return dist(lm[4], lm[8]) < 0.05;
}

// ===== TRACKING =====
const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(res=>{
    if(!res.multiHandLandmarks) return;

    const lm = res.multiHandLandmarks[0];

    cursor.x = lm[8].x * window.innerWidth;
    cursor.y = lm[8].y * window.innerHeight;

    cursorEl.style.left = cursor.x + "px";
    cursorEl.style.top = cursor.y + "px";

    const pinch = isPinch(lm);

    cursorEl.style.background = pinch ? "#ff4d4d" : "#00ffcc";

    // анимация курсора
    cursorEl.style.transform = pinch
        ? "translate(-50%,-50%) scale(1.6)"
        : "translate(-50%,-50%) scale(1)";

    // HOLD (магия)
    if(pinch){
        if(!holdStart) holdStart = Date.now();

        if(Date.now() - holdStart > 800){
            triggerAction();
            holdStart = null;
        }
    } else {
        holdStart = null;
    }

    lastPinch = pinch;
});

// действие
function triggerAction(){
    addMessage("Ты: команда");

    const reply = responses[Math.floor(Math.random()*responses.length)];

    setTimeout(()=>{
        addMessage("GPT: " + reply);
    },500);
}

// камера
const cam = new Camera(video,{
    onFrame: async ()=> await hands.send({image:video}),
    width:1280,
    height:720
});
cam.start();

</script>

</body>
</html>
