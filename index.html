<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Finger GPT Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video {
            position: absolute; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1); opacity: 0.4;
        }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 10;
        }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 20; color: #00ffcc; font-family: monospace; }
        #btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; padding: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui">SYSTEM READY</div>
    <button id="btn">START MAGIC</button>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const video = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

        function onResults(results) {
            canvasElement.width = video.clientWidth;
            canvasElement.height = video.clientHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    const mirrored = landmarks.map(p => ({x: 1-p.x, y: p.y, z: p.z}));
                    drawConnectors(canvasCtx, mirrored, HAND_CONNECTIONS, {color: '#00ffcc', lineWidth: 5});
                    drawLandmarks(canvasCtx, mirrored, {color: '#fff', radius: 3});
                    
                    if (dist(mirrored[4], mirrored[8]) < 0.05) {
                        canvasCtx.fillStyle = '#ff4d4d';
                        canvasCtx.shadowBlur = 20;
                        canvasCtx.shadowColor = '#ff4d4d';
                        canvasCtx.beginPath();
                        canvasCtx.arc(mirrored[8].x * canvasElement.width, mirrored[8].y * canvasElement.height, 20, 0, 2*Math.PI);
                        canvasCtx.fill();
                    }
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5});
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });

        document.getElementById('btn').onclick = (e) => {
            e.target.remove();
            camera.start();
        };
    </script>
</body>
</html>
